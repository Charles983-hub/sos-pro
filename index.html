<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Share Lokasi Keluarga</title>
  <meta name="theme-color" content="#25D366">
  <link rel="manifest" href="manifest.json">
  <style>
    body {font-family:'Segoe UI',Arial; text-align:center; padding:25px; background:linear-gradient(135deg,#25D366 0%,#128C7E 100%); color:white; min-height:100vh;}
    .box {background:rgba(255,255,255,0.95); color:#333; padding:25px; border-radius:20px; max-width:400px; margin:auto;}
    input {padding:14px; width:100%; margin:10px 0; border-radius:10px; border:2px solid #ddd; font-size:16px;}
    button {padding:16px; width:100%; margin:15px 0; border-radius:12px; border:none; font-size:18px; font-weight:bold; background:#25D366; color:white; cursor:pointer;}
    #hasil {margin-top:20px; padding:15px; background:#f0f0f0; border-radius:10px; display:none; color:#333; text-align:left;}
    .note {font-size:12px; color:#555; margin-top:15px;}
  </style>
</head>
<body>
  <div class="box">
    <h2>📍 SHARE LOKASI IZIN</h2>
    <p>Kirim lokasi kamu ke keluarga/temen. Dia juga harus kirim balik biar saling tau.</p>
    
    <input id="nama" placeholder="Nama kamu" required>
    <input id="nomor" placeholder="Nomor WA keluarga 628xx" required>
    
    <button onclick="shareLokasi()">KIRIM LOKASI SAYA SEKARANG</button>
    
    <div id="hasil"></div>
    
    <p class="note">⚠️ Penting: Ini cuma kirim lokasi KAMU. Kamu nggak bisa lacak HP dia kecuali dia juga pencet tombol ini & kirim ke kamu. 2 arah = adil + halal.</p>
  </div>

  <script>
    if('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js');
    }

    function shareLokasi() {
      let nama = document.getElementById("nama").value.trim();
      let nomor = document.getElementById("nomor").value.trim();
      let hasil = document.getElementById("hasil");
      
      if(!nama || !nomor) {
        alert("Isi nama + nomor WA keluarga dulu ya!");
        return;
      }
      if(!nomor.startsWith("628")) {
        alert("Nomor WA harus awalan 628xxx");
        return;
      }
      
      hasil.style.display = "block";
      hasil.innerHTML = "📡 Mengambil GPS kamu...";
      
      navigator.geolocation.getCurrentPosition(function(pos) {
        let lat = pos.coords.latitude;
        let lon = pos.coords.longitude;
        let maps = `https://www.google.com/maps?q=${lat},${lon}`;
        let waktu = new Date().toLocaleString("id-ID");
        
        let pesan = `Assalamualaikum ${nama} kirim lokasi.\nWaktu: ${waktu}\nLokasi saya: ${maps}\n\nKalau kamu juga mau share lokasi, buka app ini & kirim balik ke aku ya 🤗`;
        
        hasil.innerHTML = `<b>✅ Lokasi kamu siap!</b><br><br>${pesan.replace(/\n/g,"<br>")}<br><br><a href
